<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Bloom & Co.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">BLOOM & CO.</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
            <a href="cart.html">Cart (<span id="cartCount">0</span>)</a>
        </nav>
    </header>

    <main class="shop-container">
        <!-- Market price update card -->
        <div class="market-card">
    <div class="market-text">
        <h3>💎 Live Market Pricing</h3>
        <p>Our prices reflect real‑time textile market trends. Click the button to refresh all products with the latest multiplier.</p>
        <button id="updateMarketBtn" class="btn market-btn">Update Prices</button>
    </div>
</div>

        <!-- Search bar -->
        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="Search dresses, tops, shoes..." class="search-box">
        </div>

        <h2>All Dreamy Pieces</h2>
        <div id="productsGrid" class="products-grid">Loading...</div>

        <!-- Mini cart summary -->
        <div class="cart-summary">
            <h3>Your Cart 🛍️</h3>
            <div id="cartSummary" class="cart-items-summary"></div>
            <div class="cart-summary-footer">
                <span>Total: <strong id="cartPreviewTotal">€0.00</strong></span>
                <a href="cart.html" class="cart-link">Go to Cart →</a>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Bloom & Co. – Node.js + MySQL</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
